name: Build Android Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: 16.32.0
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android (EAS)
        id: build_android
        run: |
          eas build --platform android --profile preview --non-interactive --wait --json > build_android.json
          BUILD_ID=$(node -e 'const fs=require("fs");const d=JSON.parse(fs.readFileSync("build_android.json","utf8"));const b=Array.isArray(d)?d[0]:d;console.log(b.id);')
          echo "build_id=$BUILD_ID" >> $GITHUB_OUTPUT

      - name: Resolve Android artifact
        id: android_artifact
        run: |
          URL=$(node -e '
            const fs = require("fs");
            const data = JSON.parse(fs.readFileSync("build_android.json", "utf8"));
            const root = Array.isArray(data) ? data[0] : data;
            const url = root.artifacts?.buildUrl || root.buildUrl || root.applicationArchiveUrl || "";
            if (url) console.log(url);
          ')
          if [ -z "$URL" ]; then
            echo "URL not found in build output, fetching from EAS..."
            eas build:view ${{ steps.build_android.outputs.build_id }} --json > build_android_view.json
            URL=$(node -e '
              const fs = require("fs");
              const data = JSON.parse(fs.readFileSync("build_android_view.json", "utf8"));
              const root = Array.isArray(data) ? data[0] : data;
              const url = root.artifacts?.buildUrl || root.buildUrl || root.applicationArchiveUrl || "";
              if (url) console.log(url);
            ')
          fi
          if [ -z "$URL" ]; then
            echo "[ERROR] Android artifact URL not found"
            exit 1
          fi
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Download Android APK
        run: curl -L "${{ steps.android_artifact.outputs.url }}" -o trace-android.apk

      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: trace-android
          path: trace-android.apk
          retention-days: 30

      - name: Upload To Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: trace-android.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
