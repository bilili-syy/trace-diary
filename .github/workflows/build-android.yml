name: Build Release (Android + iOS)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android (EAS)
        id: build_android
        run: |
          BUILD_JSON=$(eas build --platform android --profile preview --non-interactive --wait --json)
          echo "$BUILD_JSON" > build_android.json
          BUILD_ID=$(python - <<'PY'
import json
data=json.load(open('build_android.json'))
print(data[0]['id'])
PY
)
          echo "build_id=$BUILD_ID" >> $GITHUB_OUTPUT

      - name: Download Android APK
        run: eas build:download --platform android --id ${{ steps.build_android.outputs.build_id }} --output trace-android.apk

      - name: Build iOS (EAS)
        id: build_ios
        run: |
          BUILD_JSON=$(eas build --platform ios --profile preview --non-interactive --wait --json)
          echo "$BUILD_JSON" > build_ios.json
          BUILD_ID=$(python - <<'PY'
import json
data=json.load(open('build_ios.json'))
print(data[0]['id'])
PY
)
          echo "build_id=$BUILD_ID" >> $GITHUB_OUTPUT

      - name: Download iOS IPA
        run: eas build:download --platform ios --id ${{ steps.build_ios.outputs.build_id }} --output trace-ios.ipa

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trace-release
          path: |
            trace-android.apk
            trace-ios.ipa
          retention-days: 30

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            trace-android.apk
            trace-ios.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
