name: Build Release (Android + iOS)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android (EAS)
        id: build_android
        run: |
          BUILD_JSON=$(eas build --platform android --profile preview --non-interactive --wait --json)
          echo "$BUILD_JSON" > build_android.json
          BUILD_ID=$(python -c "import json;print(json.load(open('build_android.json'))[0]['id'])")
          echo "build_id=$BUILD_ID" >> $GITHUB_OUTPUT

      - name: Resolve Android artifact
        id: android_artifact
        run: |
          BUILD_VIEW=$(eas build:view ${{ steps.build_android.outputs.build_id }} --json)
          echo "$BUILD_VIEW" > build_android_view.json
          URL=$(python -c "import json; d=json.load(open('build_android_view.json')); a=d.get('artifacts') or {}; print(a.get('buildUrl') or a.get('applicationArchiveUrl') or a.get('artifactUrl') or a.get('url') or '')")
          if [ -z \"$URL\" ]; then
            echo \"[ERROR] Android artifact URL not found\"; exit 1;
          fi
          echo \"url=$URL\" >> $GITHUB_OUTPUT

      - name: Download Android APK
        run: curl -L \"${{ steps.android_artifact.outputs.url }}\" -o trace-android.apk

      - name: Build iOS (EAS)
        id: build_ios
        run: |
          BUILD_JSON=$(eas build --platform ios --profile preview --non-interactive --wait --json)
          echo "$BUILD_JSON" > build_ios.json
          BUILD_ID=$(python -c "import json;print(json.load(open('build_ios.json'))[0]['id'])")
          echo "build_id=$BUILD_ID" >> $GITHUB_OUTPUT

      - name: Resolve iOS artifact
        id: ios_artifact
        run: |
          BUILD_VIEW=$(eas build:view ${{ steps.build_ios.outputs.build_id }} --json)
          echo "$BUILD_VIEW" > build_ios_view.json
          URL=$(python -c "import json; d=json.load(open('build_ios_view.json')); a=d.get('artifacts') or {}; print(a.get('buildUrl') or a.get('applicationArchiveUrl') or a.get('artifactUrl') or a.get('url') or '')")
          if [ -z \"$URL\" ]; then
            echo \"[ERROR] iOS artifact URL not found\"; exit 1;
          fi
          echo \"url=$URL\" >> $GITHUB_OUTPUT

      - name: Download iOS IPA
        run: curl -L \"${{ steps.ios_artifact.outputs.url }}\" -o trace-ios.ipa

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trace-release
          path: |
            trace-android.apk
            trace-ios.ipa
          retention-days: 30

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            trace-android.apk
            trace-ios.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
