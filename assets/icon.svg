<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8F6F3"/>
      <stop offset="100%" style="stop-color:#EBE7E1"/>
    </linearGradient>
    <linearGradient id="featherGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6B7B6E"/>
      <stop offset="100%" style="stop-color:#4A5A4D"/>
    </linearGradient>
  </defs>
  
  <rect width="1024" height="1024" rx="180" fill="url(#bgGradient)"/>
  
  <g transform="translate(512, 512)">
    <path 
      d="M-180 180 
