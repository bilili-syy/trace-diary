    <g stroke="#4A5A4D" stroke-width="3" stroke-linecap="round" opacity="0.6">
      <line x1="-100" y1="100" x2="-40" y2="60"/>
      <line x1="-60" y1="80" x2="0" y2="20"/>
      <line x1="-20" y1="40" x2="40" y2="-20"/>
      <line x1="20" y1="0" x2="80" y2="-60"/>
      <line x1="60" y1="-40" x2="120" y2="-100"/>
      <line x1="100" y1="-80" x2="140" y2="-140"/>
    </g>
    
    <circle cx="170" cy="-190" r="12" fill="#3D4A3F"/>
  </g>
  
  <g transform="translate(512, 750)">
    <path 
      d="M-80 0 Q-40 -20, 0 -25 Q40 -20, 80 0" 
